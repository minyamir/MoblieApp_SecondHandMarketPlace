name: HaHu
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0' # Use this standard constraint for better compatibility

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Network
  dio: ^5.4.0

  # State management
  flutter_bloc: ^8.1.3

  # Media & Verification
  camera: ^0.11.0
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  video_player: ^2.8.2

  # Dependency Injection
  get_it: ^7.6.4

  # Local storage
  shared_preferences: ^2.2.2

  # Env variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true